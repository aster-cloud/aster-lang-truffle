name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: aster-lang-truffle

      # Shared version catalog (ADR 0012). Published into Maven Local the
      # same way as every other aster-lang dep below, so the catalog
      # import in settings.gradle resolves without a GitHub Packages
      # round-trip.
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      # 语言包源：aster-lang-locales（现役，catalog 驱动）。旧独立 en/zh/de 仓已归档。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-locales
          path: aster-lang-locales
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      # hi 现在是独立 SPI 包，进了 platform 的 locales bundle —— 与 en/zh/de 一样
      # 需作为兄弟仓 checkout + 发布到 Maven Local，否则 runtimeClasspath 解析不到。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-hi
          path: aster-lang-hi
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish dependencies to Maven Local
        run: |
          cd aster-lang-platform && ./gradlew publishToMavenLocal && cd ..
          cd aster-lang-core && ./gradlew publishToMavenLocal -x test && cd ..
          cd aster-lang-runtime && ./gradlew publishToMavenLocal -x test && cd ..
          cd aster-lang-locales && ./gradlew publishToMavenLocal -x test && cd ..
          cd aster-lang-hi && ./gradlew publishToMavenLocal -x test && cd ..

      - name: Build & Test
        working-directory: aster-lang-truffle
        run: ./gradlew build -PexcludeBenchmarks=true
