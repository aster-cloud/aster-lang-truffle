name: Native Image Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 版本目录（asterLibs 的版本源）。必须先 checkout + 发布到 mavenLocal，
      # 否则下游 core/truffle 的 catalog import 解析不到 aster-lang-platform，
      # nativeCompile 在依赖解析阶段就失败（与 ci.yml 同序）。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-en
          path: aster-lang-en
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-zh
          path: aster-lang-zh
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-de
          path: aster-lang-de
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'gradle'

      - name: Publish dependencies to Maven Local
        run: |
          cd aster-lang-platform && ./gradlew publishToMavenLocal && cd ..
          cd aster-lang-core && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-runtime && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-en && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-zh && ./gradlew publishToMavenLocal -x test
          cd ../aster-lang-de && ./gradlew publishToMavenLocal -x test

      - name: Native Compile
        run: ./gradlew nativeCompile

      # nativeCompile 产出 shared library（Linux `aster.so` / macOS `aster.dylib`）
      # + C headers，不是独立 executable（Truffle polyglot embedding 用）。旧路径
      # 硬编码 `aster` → 找不到文件、从不上传。上传整个 nativeCompile 目录（含 .so
      # + headers），跨 OS 通用。
      - name: Upload Native Binary
        uses: actions/upload-artifact@v7
        with:
          name: aster-native
          path: build/native/nativeCompile/
          retention-days: 7
